<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AudioSync</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        spBlack: '#000000',
                        spBase: '#121212',
                        spElevated: '#1a1a1a',
                        spHighlight: '#282828',
                        spGreen: '#1DB954',
                        spGreenHover: '#1ed760',
                        spText: '#b3b3b3',
                        spTextWhite: '#ffffff'
                    },
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-spBase text-spText font-sans h-screen overflow-hidden flex select-none">

    <!-- Sidebar (Left) -->
    <aside class="w-64 bg-spBlack flex-shrink-0 flex flex-col hidden md:flex h-full">
        <div class="p-6 pb-2">
            <h1 class="text-spTextWhite text-2xl font-bold tracking-tight flex items-center gap-2">
                <svg class="w-8 h-8 text-spGreen" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 14.5c-2.49 0-4.5-2.01-4.5-4.5S9.51 7.5 12 7.5s4.5 2.01 4.5 4.5-2.01 4.5-4.5 4.5zm0-7.5c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                AudioSync
            </h1>
        </div>
        <nav class="flex-1 p-4 space-y-2 mt-4">
            <button id="nav-home" class="w-full flex items-center gap-4 px-4 py-3 rounded-md text-spTextWhite bg-spHighlight font-semibold transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                Beranda
            </button>
            <button id="nav-history" class="w-full flex items-center gap-4 px-4 py-3 rounded-md text-spText hover:text-spTextWhite hover:bg-spHighlight font-semibold transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Riwayat
            </button>
            <hr class="border-spHighlight my-2">
            <button id="update-ytdlp-btn" class="w-full flex items-center gap-4 px-4 py-3 rounded-md text-spText hover:text-spTextWhite hover:bg-spHighlight font-semibold transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                Update Core
            </button>
        </nav>
        <div class="p-6">
            <div class="text-xs font-medium opacity-50">Local Web MP3</div>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col h-full bg-gradient-to-b from-spElevated to-spBase relative overflow-hidden">
        
        <!-- Mobile Header (Hidden on Desktop) -->
        <header class="md:hidden flex items-center justify-between p-4 bg-spBlack/90 backdrop-blur-md sticky top-0 z-20">
            <h1 class="text-spTextWhite text-xl font-bold flex items-center gap-2">
                <svg class="w-6 h-6 text-spGreen" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 14.5c-2.49 0-4.5-2.01-4.5-4.5S9.51 7.5 12 7.5s4.5 2.01 4.5 4.5-2.01 4.5-4.5 4.5zm0-7.5c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                AudioSync
            </h1>
            <div class="flex gap-4">
                <button id="nav-home-mobile" class="text-spTextWhite font-semibold text-sm">Beranda</button>
                <button id="nav-history-mobile" class="text-spText hover:text-spTextWhite font-semibold text-sm">Riwayat</button>
            </div>
        </header>

        <!-- Scrollable Container -->
        <div class="flex-1 overflow-y-auto custom-scrollbar p-6 md:p-8" id="main-scroll-area">
            
            <!-- Section: Download (Beranda) -->
            <section id="section-download" class="animate-fade-in max-w-5xl mx-auto">
                <h2 class="text-3xl md:text-4xl font-bold text-spTextWhite mb-8 tracking-tight">Unduh Musik</h2>
                
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <!-- Left Column: Controls -->
                    <div class="lg:col-span-2 space-y-6">
                        
                        <!-- URL Input Card -->
                        <div class="bg-spElevated rounded-xl p-6 shadow-xl transition-all hover:bg-spElevated/80 border border-spHighlight">
                            <label class="block text-sm font-bold text-spTextWhite mb-3 uppercase tracking-wider">Tautan YouTube</label>
                            
                            <div class="flex flex-col gap-3 relative group">
                                <div class="relative w-full">
                                    <div class="absolute top-4 left-4 text-spText">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                                    </div>
                                    <textarea id="url-input" rows="3" class="w-full bg-spHighlight border border-transparent rounded-lg py-4 pl-12 pr-12 focus:outline-none focus:ring-2 focus:ring-spTextWhite focus:bg-spHighlight transition-all placeholder-spText/50 text-spTextWhite resize-none font-medium text-sm" placeholder="Masukkan URL YouTube di sini (Bisa banyak baris)..."></textarea>
                                    <button id="clear-btn" class="absolute top-4 right-4 text-spText hover:text-spTextWhite hidden transition-colors" title="Bersihkan">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                                    </button>
                                </div>
                                <button id="paste-btn" class="self-end bg-spHighlight hover:bg-spHighlight/80 text-spTextWhite hover:scale-105 active:scale-95 px-5 py-2.5 rounded-full transition-all flex items-center gap-2 font-bold text-sm border border-spHighlight/50">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                                    Paste
                                </button>
                            </div>
                        </div>

                        <!-- Settings Card -->
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div class="bg-spElevated rounded-xl p-5 border border-spHighlight">
                                <label class="block text-xs font-bold text-spText mb-2 uppercase tracking-wider">Kualitas Audio</label>
                                <div class="relative">
                                    <select id="quality-select" class="w-full bg-spHighlight border border-transparent rounded-md py-3 pl-4 pr-10 focus:outline-none focus:ring-2 focus:ring-spTextWhite text-spTextWhite font-medium text-sm appearance-none cursor-pointer">
                                        <option value="320">Sangat Tinggi - 320 kbps</option>
                                        <option value="192" selected>Tinggi - 192 kbps</option>
                                        <option value="128">Normal - 128 kbps</option>
                                    </select>
                                    <div class="absolute inset-y-0 right-0 flex items-center px-3 pointer-events-none text-spTextWhite">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                    </div>
                                </div>
                            </div>
                            <div class="bg-spElevated rounded-xl p-5 border border-spHighlight flex flex-col justify-between">
                                <label class="block text-xs font-bold text-spText mb-2 uppercase tracking-wider">Folder Penyimpanan</label>
                                <div class="flex gap-2">
                                    <input type="text" id="folder-input" class="w-full bg-spHighlight border border-transparent rounded-md py-2 px-3 focus:outline-none focus:ring-2 focus:ring-spTextWhite text-spTextWhite text-sm font-medium" placeholder="Default">
                                    <button id="open-folder-btn" class="bg-spHighlight hover:bg-spHighlight/80 text-spTextWhite hover:scale-105 active:scale-95 px-3 py-2 rounded-md transition-all shrink-0" title="Buka Folder">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path></svg>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Start Button -->
                        <div class="pt-2">
                            <button id="download-btn" class="bg-spGreen hover:bg-spGreenHover text-spBlack hover:scale-[1.02] active:scale-[0.98] px-8 py-4 rounded-full transition-all font-bold text-base w-full sm:w-auto inline-flex items-center justify-center gap-3 shadow-lg shadow-spGreen/20">
                                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                                Mulai Unduh
                            </button>
                        </div>
                    </div>

                    <!-- Right Column: Queue & Preview -->
                    <div class="space-y-6">
                        <!-- Preview State -->
                        <div id="preview-empty" class="bg-spElevated rounded-xl p-8 border border-spHighlight h-64 flex flex-col items-center justify-center text-center">
                            <div class="w-16 h-16 bg-spHighlight rounded-full flex items-center justify-center mb-4">
                                <svg class="w-8 h-8 text-spText" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                            </div>
                            <h3 class="text-spTextWhite font-bold mb-1">Pratinjau Kosong</h3>
                            <p class="text-sm text-spText">Masukkan URL untuk melihat</p>
                        </div>

                        <!-- Loaded Preview -->
                        <div id="preview-loaded" class="hidden">
                            <div class="bg-spElevated rounded-xl p-4 border border-spHighlight overflow-hidden group">
                                <div class="relative aspect-video rounded-lg overflow-hidden shadow-md bg-spBlack mb-4">
                                    <img id="video-thumbnail" src="" alt="Thumbnail" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                                    <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                        <div class="w-12 h-12 bg-spGreen rounded-full flex items-center justify-center shadow-lg shadow-spGreen/30 transform scale-90 group-hover:scale-100 transition-transform">
                                            <svg class="w-5 h-5 text-spBlack ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                                        </div>
                                    </div>
                                </div>
                                <h3 id="video-title" class="text-spTextWhite font-bold text-sm line-clamp-2 leading-tight">...</h3>
                            </div>
                        </div>

                        <!-- Queue Container -->
                        <div id="queue-container" class="bg-spElevated rounded-xl p-5 border border-spHighlight hidden flex-col max-h-[500px]">
                            <h3 class="text-sm font-bold text-spTextWhite uppercase tracking-wider mb-4 flex items-center gap-2">
                                <svg class="w-5 h-5 text-spGreen" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
                                Antrean
                            </h3>
                            <div id="queue-list" class="space-y-3 overflow-y-auto custom-scrollbar flex-1 pr-1">
                                <!-- Injected Queue Items -->
                            </div>
                        </div>

                    </div>
                </div>
            </section>

            <!-- Section: History -->
            <section id="section-history" class="hidden animate-fade-in max-w-5xl mx-auto">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-8 gap-4">
                    <div>
                        <h2 class="text-3xl md:text-4xl font-bold text-spTextWhite tracking-tight">Riwayat Unduhan</h2>
                        <p class="text-spText mt-2">Kumpulan file MP3 yang pernah Anda unduh sebelumnya.</p>
                    </div>
                    <button id="clear-history-btn" class="bg-transparent hover:bg-red-500/10 text-spText hover:text-red-500 border border-spHighlight hover:border-red-500/30 px-5 py-2.5 rounded-full text-sm font-bold transition-colors flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        Hapus Semua
                    </button>
                </div>

                <div id="history-list" class="space-y-3">
                    <!-- Injected History Items -->
                </div>
            </section>

        </div>
    </main>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3 pointer-events-none"></div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
